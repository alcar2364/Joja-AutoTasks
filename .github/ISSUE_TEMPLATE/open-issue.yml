name: Open issue
description: Track an implementation problem that should be solved later but is not a deferment.
title: "Open issue: "
labels:
  - implementation-issue
  - "issue-type: open-issue"
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief statement of the issue.
    validations:
      required: true
  - type: input
    id: created_phase
    attributes:
      label: Created phase
      description: Phase where the issue was identified.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source
      description: Checklist step, review, workflow, or developer source.
    validations:
      required: true
  - type: input
    id: scheduled_target
    attributes:
      label: Scheduled target
      description: Required for `Critical` and `High` issues.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
  - type: textarea
    id: rationale
    attributes:
      label: Rationale and context
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance / closing criteria
    validations:
      required: true