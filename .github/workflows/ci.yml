name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Add reference assemblies
        uses: Pathoschild/SMAPI-ModBuildWorkflow/add-reference-assemblies@v0

      - name: Restore
        run: dotnet restore JojaAutoTasks.sln

      - name: Build
        run: dotnet build JojaAutoTasks.csproj -c Debug -p:EnableModDeploy=false -p:EnableModZip=false --no-restore

      - name: Test
        run: dotnet test "Tests/JojaAutoTasks.Tests.csproj"
