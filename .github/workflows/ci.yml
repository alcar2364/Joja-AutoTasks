name: CI

on:
  push:
    branches:
      - development
      - main
      - release/**
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "manifest.json"
  pull_request:
    branches:
      - development
      - main
      - release/**
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "manifest.json"

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Add reference assemblies
        uses: Pathoschild/SMAPI-ModBuildWorkflow/add-reference-assemblies@v0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Restore
        run: dotnet restore JojaAutoTasks.sln

      # || true keeps this warning-only until packages are confirmed clean;
      # remove once no advisories are reported on a passing run.
      - name: Check for vulnerable packages
        run: dotnet list JojaAutoTasks.sln package --vulnerable --include-transitive || true

      - name: Build
        run: dotnet build JojaAutoTasks.csproj -c Debug -p:EnableModDeploy=false -p:EnableModZip=false --no-restore

      - name: Test
        run: dotnet test "Tests/JojaAutoTasks.Tests.csproj" --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
