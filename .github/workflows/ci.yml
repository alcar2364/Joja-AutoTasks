name: CI

on:
  push:
    branches: [development]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "manifest.json"
  pull_request:
    branches: [development]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "manifest.json"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Add reference assemblies
        uses: Pathoschild/SMAPI-ModBuildWorkflow/add-reference-assemblies@v0

      - name: Restore
        run: dotnet restore JojaAutoTasks.sln

      - name: Build
        run: dotnet build JojaAutoTasks.csproj -c Debug -p:EnableModDeploy=false -p:EnableModZip=false --no-restore

      # NOTE: Automated tests are NOT run in CI. An admin must run
      #   dotnet test "Tests/JojaAutoTasks.Tests.csproj"
      # locally and confirm all tests pass before approving and merging
      # any pull request that changes code.
