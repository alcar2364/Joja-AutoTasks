name: Implementation Issues Migrate Deferments

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: implementation-issues-migrate-deferments
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Migrate legacy deferments
        run: python scripts/implementation_issues.py migrate-deferments

      - name: Commit migrated implementation issue artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Project/Tasks/ImplementationPlan/ImplementationIssues
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: migrate legacy deferments into implementation issues"
          for i in 1 2 3; do
            git pull --rebase origin HEAD && git push && break
            sleep $((i * 5))
          done || exit 1