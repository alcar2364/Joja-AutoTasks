name: Implementation Issues Sync From GitHub

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - reopened
      - closed

permissions:
  contents: write
  issues: read

concurrency:
  group: implementation-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: contains(join(github.event.issue.labels.*.name, ','), 'implementation-issue')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync issue into local records
        run: python scripts/implementation_issues.py sync-from-issue-event --event-path "$GITHUB_EVENT_PATH"

      - name: Commit synced issue changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Project/Tasks/ImplementationPlan/ImplementationIssues
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: sync implementation issue #${{ github.event.issue.number }}"
          git push