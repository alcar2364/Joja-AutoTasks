name: Implementation Issues Sync To GitHub

on:
  workflow_dispatch:
  push:
    branches: [development]
    paths:
      - "Project/Tasks/ImplementationPlan/ImplementationIssues/Records/**"

permissions:
  contents: write
  issues: write

concurrency:
  group: implementation-issues-local-to-github
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      IMPLEMENTATION_ISSUES_BRANCH: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.IMPLEMENTATION_ISSUES_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create GitHub issues for local-only records
        run: |
          python scripts/implementation_issues.py sync-local-to-github \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Commit backfilled issue metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Project/Tasks/ImplementationPlan/ImplementationIssues
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: backfill implementation issue metadata"
          git push origin HEAD:${IMPLEMENTATION_ISSUES_BRANCH}
